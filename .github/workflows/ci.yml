name: ci

on:
  pull_request:
  push:
    branches: [main, dev]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROFILES_DIR: ${{ github.workspace }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Install dbt packages
        run: uv run dbt deps

      - name: Lint Python (ruff)
        run: uv run ruff check scripts tests_python

      - name: Extract sample data (5 rubric cities)
        run: uv run python scripts/extract_open_meteo.py --cities Madrid Barcelona Valencia Sevilla Bilbao

      - name: Load into DuckDB
        run: uv run python scripts/load_to_duckdb.py

      - name: Lint SQL (sqlfluff)
        run: uv run sqlfluff lint models

      - name: Python unit tests
        run: uv run pytest tests_python --cov=extract_open_meteo --cov-report=term-missing --cov-fail-under=80

      - name: dbt build (dev target)
        # The marts layer (models/marts/*.sql) is still empty placeholders owned
        # by Role 3; building an empty model errors. Scope to the layers that are
        # implemented and integrate with the raw data this pipeline produces.
        # Drop the selector once the marts are filled in.
        run: uv run dbt build --target dev -s staging intermediate
