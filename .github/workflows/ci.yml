name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Install dbt packages
        run: uv run dbt deps

      - name: sqlfluff lint
        run: uv run sqlfluff lint models/ --templater dbt || true   # TODO: drop the `|| true` once Role 2 finishes initial models

      - name: pytest
        run: uv run pytest tests_python/ || echo "no python tests yet"   # TODO: drop fallback once Role 1 adds tests

      - name: dbt build (dev)
        env:
          DBT_PROFILES_DIR: .
        run: uv run dbt build --target dev --fail-fast
