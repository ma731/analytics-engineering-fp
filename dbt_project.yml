name: weather_analytics
version: "1.0.0"
config-version: 2

profile: weather_analytics

model-paths: ["models"]
test-paths: ["tests"]
analysis-paths: ["analyses"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

clean-targets:
  - target
  - dbt_packages

models:
  weather_analytics:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
      # Write model + column descriptions into the warehouse as COMMENTs.
      +persist_docs:
        relation: true
        columns: true

vars:
  # Number of standard deviations from the seasonal mean a day's temperature
  # must deviate by to be flagged extreme in mart_temperature_anomaly. Defined
  # once here so the rule is reproducible/overridable rather than a magic
  # number buried in SQL.
  extreme_anomaly_stddev: 2
